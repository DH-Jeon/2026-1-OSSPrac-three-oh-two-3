<!DOCTYPE html>
<html lang="ko" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team 302 · OSS Project{% endblock %}</title>

    <!-- 다크모드 깜빡임 방지: 초기 테마를 미리 적용 -->
    <script>
        (function () {
            const saved = localStorage.getItem("theme") || "light";
            document.documentElement.setAttribute("data-bs-theme", saved);
        })();
    </script>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- AOS 애니메이션 -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="{% if active_page == 'home' %}has-video-bg{% endif %}">

{% if active_page == 'home' %}
<!-- 두바이 영상 배경 (Hero + About 영역 동안만 노출) -->
<div class="video-bg-wrap" aria-hidden="true">
    <video class="video-bg" autoplay muted loop playsinline
           poster="{{ url_for('static', filename='images/dubai_poster.jpg') }}">
        <source src="{{ url_for('static', filename='videos/dubai.mp4') }}" type="video/mp4">
    </video>
    <div class="video-bg-overlay"></div>
</div>
{% endif %}

<!-- 스크롤 진행도 바 -->
<div id="scrollProgress"></div>

<!-- 네비게이션 -->
<nav class="navbar navbar-expand-lg fixed-top glass-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
            <span class="brand-logo">
                <i class="bi bi-hexagon-fill"></i>
            </span>
            <span class="brand-text">Team <span class="brand-accent">302</span></span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="{{ url_for('index') }}">
                        Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('index') }}#origin">Why 302?</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'members' %}active{% endif %}" href="{{ url_for('index') }}#team">Team</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'contact' %}active{% endif %}" href="{{ url_for('contact') }}">Contact</a>
                </li>
                <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
                    <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                        <i id="themeIcon" class="bi bi-moon-stars-fill"></i>
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="site-footer">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6">
                <div class="footer-brand">
                    <i class="bi bi-hexagon-fill me-2"></i>
                    <strong>Team 302</strong>
                    <span class="ms-2 text-secondary small">Open Source Software Project</span>
                </div>
            </div>
            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                <a href="https://github.com/CSID-DGU/2026-1-OSSPrac-three-oh-two-3" target="_blank" rel="noopener" class="footer-repo-link mb-2">
                    <i class="bi bi-github"></i> CSID-DGU/2026-1-OSSPrac-three-oh-two-3
                </a>
                <p class="mb-0 small text-secondary">
                    © 2026 Team 302. Built with
                    <i class="bi bi-heart-fill text-danger mx-1"></i>
                    using Flask · Bootstrap · Open Source.
                </p>
            </div>
        </div>
    </div>
</footer>

<!-- Scroll to Top -->
<button id="scrollTop" class="scroll-top" aria-label="Scroll to top">
    <i class="bi bi-arrow-up"></i>
</button>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true, offset: 80 });
</script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>

</body>
</html>
